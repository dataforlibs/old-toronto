.title-bar{position:absolute;top:12px;left:12px;z-index:1000;background:rgba(244,236,224,.96);border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:14px 18px;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.15)}

const map = L.map('map', {zoomControl: false}).setView([43.657, -79.388], 14);
L.control.zoom({position: 'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
}).addTo(map);

const G = D.gridParams;
let activeEra = 0;
let gridOpacity = 0.4;
let normMode = 'norm';

const gridLayer = L.layerGroup().addTo(map);

function dColor(t) {
  if (t < 0.02) return 'rgba(0,0,0,0)';
  const r = Math.round(120 + 135 * t);
  const g = Math.round(70 + 100 * Math.pow(t, 0.7));
  const b = Math.round(10 + 30 * t);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function drawGrid() {
  gridLayer.clearLayers();
  const era = D.eras[activeEra];
  const cells = era.grid;
  const maxVal = normMode === 'norm' ? era.gridMax : D.globalMax;
  if (maxVal === 0) return;
  const logMax = Math.log(maxVal + 1);
  for (const c of cells) {
    if (c[2] < 1) continue;
    const lat = G.latMin + c[0] * G.latStep;
    const lng = G.lngMin + c[1] * G.lngStep;
    const t = Math.log(c[2] + 1) / logMax;
    const opacity = gridOpacity * Math.min(1, t * 1.6 + 0.08);
    L.rectangle([[lat, lng], [lat + G.latStep, lng + G.lngStep]], {
      weight: 0, fillColor: dColor(t), fillOpacity: opacity
    }).bindTooltip(c[2] + ' photos', {sticky: true}).addTo(gridLayer);
  }
}

const routeLayer = L.layerGroup().addTo(map);
const routeCache = {};

async function fetchOSRM(waypoints) {
  if (waypoints.length < 2) return null;
  const coords = waypoints.map(function(p) { return p.lng + ',' + p.lat; }).join(';');
  try {
    const res = await fetch('https://router.project-osrm.org/route/v1/foot/' + coords + '?overview=full&geometries=geojson&steps=false');
    if (!res.ok) return null;
    const data = await res.json();
    if (data.code !== 'Ok' || !data.routes || !data.routes[0]) return null;
    return data.routes[0].geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
  } catch(e) { return null; }
}

function stopIcon(color, n) {
  return L.divIcon({
    className: '',
    html: '<div style="width:22px;height:22px;background:' + color + ';border:2.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;box-shadow:0 2px 5px rgba(0,0,0,.35);font-family:Source Sans 3,sans-serif;">' + n + '</div>',
    iconSize: [22, 22], iconAnchor: [11, 11]
  });
}

async function drawRoute() {
  routeLayer.clearLayers();
  const era = D.eras[activeEra];
  if (!era.waypoints || era.waypoints.length < 2) return;
  var statusEl = document.querySelector('[data-idx="' + activeEra + '"] .estatus');
  let streetPts = routeCache[activeEra];
  if (streetPts === undefined) {
    if (statusEl) statusEl.textContent = '…';
    document.getElementById('loadMsg').textContent = 'Fetching ' + era.label + ' route…';
    streetPts = await fetchOSRM(era.waypoints);
    routeCache[activeEra] = streetPts;
    document.getElementById('loadMsg').textContent = '';
  }
  const latlngs = streetPts || era.waypoints.map(function(p) { return [p.lat, p.lng]; });
  const isStraight = !streetPts;
  if (statusEl) statusEl.textContent = streetPts ? '✓' : '—';
  L.polyline(latlngs, {
    color: era.color, weight: isStraight ? 3 : 5, opacity: 0.85,
    dashArray: isStraight ? '6 4' : null, lineJoin: 'round', lineCap: 'round'
  }).addTo(routeLayer);
  era.waypoints.forEach(function(p, j) {
    if (j === 0) return;
    L.marker([p.lat, p.lng], {icon: stopIcon(era.color, j), zIndexOffset: 300})
      .bindTooltip('Stop ' + j, {direction: 'top', offset: [0, -12]})
      .addTo(routeLayer);
  });
}

const unionIcon = L.divIcon({
  className: '',
  html: '<div style="width:16px;height:16px;background:#fff;border:3px solid #c9a84c;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3);"></div>',
  iconSize: [16, 16], iconAnchor: [8, 8]
});
L.marker([D.union.lat, D.union.lng], {icon: unionIcon, zIndexOffset: 600})
  .bindTooltip('Union Station', {permanent: false, direction: 'top', offset: [0, -10]})
  .addTo(map);

const lmLayer = L.layerGroup().addTo(map);
const lmIcon = L.divIcon({
  className: '',
  html: '<div style="width:6px;height:6px;background:#c9a84c;border:1px solid rgba(0,0,0,.25);border-radius:50%;"></div>',
  iconSize: [6, 6], iconAnchor: [3, 3]
});
for (const lm of D.landmarks) {
  L.marker([lm.la, lm.ln], {icon: lmIcon, zIndexOffset: -100})
    .bindTooltip(lm.n + (lm.y ? ' (' + lm.y + ')' : ''), {direction: 'top', offset: [0, -4]})
    .addTo(lmLayer);
}

function updateInfo() {
  const era = D.eras[activeEra];
  const box = document.getElementById('infoBox');
  const hasRoute = era.waypoints && era.waypoints.length > 1;
  box.innerHTML =
    '<div style="margin-bottom:6px"><span class="num">' + era.gridTotal.toLocaleString() + '</span> photos in grid</div>' +
    (hasRoute ?
      '<strong>' + (era.waypoints.length - 1) + '</strong> stops · <strong>' + era.dist + '</strong> km · <strong>' + era.candidates + '</strong> locations with 3+ photos' :
      '<span style="color:#999">Select a specific era to see its route</span>') +
    '<div style="margin-top:6px;font-size:10px">' + (normMode === 'norm' ?
      'Normalized — peak cell = <strong>' + era.gridMax + '</strong> (at full intensity)' :
      'Raw — global peak = <strong>' + D.globalMax + '</strong> (shared scale across all eras)') + '</div>';
}

const eraList = document.getElementById('eraList');
D.eras.forEach(function(era, i) {
  const el = document.createElement('div');
  el.className = 'era-btn' + (i === 0 ? ' active' : '');
  el.dataset.idx = i;
  const hasRoute = era.waypoints && era.waypoints.length > 1;
  el.innerHTML =
    '<div class="swatch" style="background:' + era.color + '"></div>' +
    '<span class="elbl">' + era.label + '</span>' +
    '<span class="eshort">' + era.short + '</span>' +
    (hasRoute ? '<span class="ekm">' + era.dist + 'km</span>' : '') +
    '<span class="estatus"></span>';
  el.onclick = function() {
    activeEra = i;
    document.querySelectorAll('.era-btn').forEach(function(e) { e.classList.remove('active'); });
    el.classList.add('active');
    drawGrid();
    drawRoute();
    updateInfo();
  };
  eraList.appendChild(el);
});

document.getElementById('opSlider').oninput = function() {
  gridOpacity = this.value / 100;
  document.getElementById('opVal').textContent = this.value + '%';
  drawGrid();
};
document.getElementById('normMode').onchange = function() {
  normMode = this.value;
  drawGrid();
  updateInfo();
};
document.getElementById('lmToggle').onchange = function() {
  if (this.checked) map.addLayer(lmLayer); else map.removeLayer(lmLayer);
  document.getElementById('lmVal').textContent = this.checked ? 'on' : 'off';
};

drawGrid();
drawRoute();
updateInfo();

</script>
